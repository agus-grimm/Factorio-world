description=Vaš je zadatak poslati međuzvjezdanu svemirsku platformu. Morat ćete istražiti napredne tehnologije kako biste otključali raketni silos i otkrili druge planete. Počnite s malim stvarima, postupno se probijajte kroz automatizaciju, izgradite pouzdanu operativnu bazu i dosegnite zvijezde. Zaštitite se od domaćih vrsta, jer možda neće cijeniti vašu prisutnost.\n[font=default-bold]Ovo je predviđeni način igranja Factoria.[/font]
description-space-age=Vaš je zadatak poslati međuzvjezdanu svemirsku platformu. Morat ćete istražiti napredne tehnologije kako biste otključali raketni silos i otkrili druge planete. Počnite s malim stvarima, postupno se probijajte kroz automatizaciju, izgradite pouzdanu operativnu bazu i dosegnite zvijezde. Zaštitite se od domaćih vrsta, jer možda neće cijeniti vašu prisutnost.\n[font=default-bold]Ovo je predviđeni način igranja Factoria.[/font]
msg-intro=Dobrodošli u Factorio Freeplay. Vaš zadatak je lansirati raketu u svemir. Morat ćete istražiti napredne tehnologije kako biste otključali raketni silos. Počnite s malim i napredujte s automatizacijom. Zaštitite se od domaćih vrsta jer možda neće cijeniti vašu prisutnost.
msg-intro-space-age=Dobrodošli u Factorio: Space Age Slobodnu Igru. Vaš je zadatak poslati međuzvjezdanu svemirsku platformu. Morat ćete istražiti napredne tehnologije kako biste otključali raketni silos i otkrili druge planete. Počnite s malim stvarima, postupno se probijajte kroz automatizaciju, izgradite pouzdanu operativnu bazu i dosegnite zvijezde. Zaštitite se od domaćih vrsta, jer možda neće cijeniti vašu prisutnost.
